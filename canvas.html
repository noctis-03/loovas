<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0e0d">
  <title>∞ Canvas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body data-tool="select">

<!-- ── Canvas Layer ── -->
<div id="grid"></div>
<canvas id="preview-canvas"></canvas>
<div id="sel-rect"></div>

<!-- ── Edit Mode Indicators ── -->
<div id="edit-mode-border"></div>
<div id="edit-mode-badge">
  <span class="badge-dot"></span>
  편집 모드
</div>

<!-- ── Viewport ── -->
<div id="viewport">
  <div id="board">
    <svg id="svg-layer"></svg>
    <svg id="svg-overlay"></svg>
  </div>
</div>

<!-- ════════════════════════════════════════
     LEFT SIDEBAR — 메인 툴바
════════════════════════════════════════ -->
<aside id="left-sidebar">
  <!-- Logo / Brand — 홈(로비)으로 이동 -->
  <div id="sidebar-brand">
    <a href="index.html" id="brand-icon" title="홈으로" style="text-decoration:none;display:flex;align-items:center;justify-content:center;">∞</a>
  </div>

  <div class="sidebar-divider"></div>

  <!-- Mode Tools -->
  <div class="sidebar-section" id="mode-section">
    <button class="sbtn active" id="t-select" data-tip="선택" data-tool="select">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 2L13 8L8.5 9.5L6.5 14L3 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="sbtn" id="t-edit" data-tip="편집" data-tool="edit">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 3L13 6L6 13H3V10L10 3Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M8.5 4.5L11.5 7.5" stroke="currentColor" stroke-width="1.5"/>
      </svg>
    </button>
    <button class="sbtn" id="t-pan" data-tip="이동" data-tool="pan">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 2V14M2 8H14M5 5L2 8L5 11M11 5L14 8L11 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div class="sidebar-divider"></div>

  <!-- Draw Tools -->
  <div class="sidebar-section">
    <button class="sbtn" id="t-pen" data-tip="펜 (P)" data-tool-or-panel="pen">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M11 3L13 5L5 13L2 14L3 11L11 3Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M9.5 4.5L11.5 6.5" stroke="currentColor" stroke-width="1.5"/>
      </svg>
    </button>
    <button class="sbtn" id="t-highlight" data-tip="형광펜 (L)" data-tool-or-panel="highlight">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="3" y="5" width="10" height="6" rx="2" stroke="currentColor" stroke-width="1.5"/>
        <path d="M7 11V14M9 11V14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="sbtn" id="t-eraser" data-tip="지우개 (E)" data-tool-or-panel="eraser">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 13H13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M9 4L12 7L7 12H4L3 11L8 4H9Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div class="sidebar-divider"></div>

  <!-- Shape / Object Tools -->
  <div class="sidebar-section">
    <button class="sbtn" id="t-text" data-tip="텍스트 (T)" data-tool="text">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 4H13M8 4V13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="sbtn" id="t-rect" data-tip="사각형 (R)" data-tool="rect">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="2.5" y="4.5" width="11" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
      </svg>
    </button>
    <button class="sbtn" id="t-circle" data-tip="원 (C)" data-tool="circle">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.5"/>
      </svg>
    </button>
    <button class="sbtn" id="t-arrow" data-tip="화살표 (A)" data-tool="arrow">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 8H13M9 4L13 8L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="sbtn" id="t-sticky" data-tip="포스트잇 (S)" data-action="addSticky">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 3H14V11L10 14H2V3Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M10 11V14L14 11H10Z" fill="currentColor" opacity="0.3"/>
        <path d="M5 7H11M5 9.5H8.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="sbtn" id="t-card" data-tip="카드 창 (W)" data-action="addCard">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/>
        <path d="M2 6H14" stroke="currentColor" stroke-width="1.2" opacity="0.6"/>
        <circle cx="5" cy="4" r="0.8" fill="currentColor" opacity="0.5"/>
        <circle cx="7.5" cy="4" r="0.8" fill="currentColor" opacity="0.5"/>
        <circle cx="10" cy="4" r="0.8" fill="currentColor" opacity="0.5"/>
      </svg>
    </button>
    <button class="sbtn" data-tip="이미지" data-action="addImage">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="1.5" y="3.5" width="13" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="5.5" cy="6.5" r="1.2" stroke="currentColor" stroke-width="1.2"/>
        <path d="M1.5 10.5L5 8L7.5 10.5L10.5 7.5L14.5 11" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div class="sidebar-divider"></div>

  <!-- System -->
  <div class="sidebar-section">
    <button class="sbtn" data-tip="그리드 토글 (G)" data-action="toggleGrid">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 5.5H14M2 10.5H14M5.5 2V14M10.5 2V14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
      </svg>
    </button>
    <button class="sbtn" data-tip="저장 (Ctrl+S)" data-action="save">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 2H11L13 4V13C13 13.6 12.6 14 12 14H4C3.4 14 3 13.6 3 13V2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <rect x="5.5" y="2" width="4" height="4" rx="0.5" stroke="currentColor" stroke-width="1.2"/>
        <rect x="5" y="9" width="6" height="4" rx="0.5" stroke="currentColor" stroke-width="1.2"/>
      </svg>
    </button>
    <button class="sbtn" data-tip="불러오기" data-action="load">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 5H6L7.5 3H14V13H2V5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M8 7V11M6 9L8 11L10 9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="sbtn sbtn-danger" data-tip="전체 삭제" data-action="clearAll">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 5H13L12 14H4L3 5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M1.5 5H14.5M6 5V3H10V5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M6.5 8V11.5M9.5 8V11.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- Spacer -->
  <div class="sidebar-spacer"></div>

  <!-- Undo / Redo -->
  <div class="sidebar-section">
    <button class="sbtn ur-btn" id="t-undo" data-tip="실행 취소 (Ctrl+Z)" data-action="undo">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 6L6 3M3 6L6 9M3 6H10C12.2 6 14 7.8 14 10C14 12.2 12.2 14 10 14H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="sbtn ur-btn" id="t-redo" data-tip="다시 실행 (Ctrl+Shift+Z)" data-action="redo">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M13 6L10 3M13 6L10 9M13 6H6C3.8 6 2 7.8 2 10C2 12.2 3.8 14 6 14H10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</aside>

<!-- ════════════════════════════════════════
     TOP BAR — 브랜드 + 줌
════════════════════════════════════════ -->
<header id="topbar">
  <div id="canvas-info">
    <span id="title-pill">∞ Canvas</span>
  </div>
  <div id="topbar-right">
    <div id="zoom-pill">100%</div>
  </div>
</header>

<!-- ════════════════════════════════════════
     COLOR TRAY — 플로팅 드로잉 팔레트
════════════════════════════════════════ -->
<div id="color-tray">
  <div class="ct-title">색상</div>
  <div class="ct-colors">
    <div class="cdot active" style="--c:#1a1714" data-c="#1a1714"></div>
    <div class="cdot" style="--c:#c84b2f" data-c="#c84b2f"></div>
    <div class="cdot" style="--c:#2b6cb0" data-c="#2b6cb0"></div>
    <div class="cdot" style="--c:#2d8a4e" data-c="#2d8a4e"></div>
    <div class="cdot" style="--c:#7c3d9e" data-c="#7c3d9e"></div>
    <div class="cdot" style="--c:#e8a320" data-c="#e8a320"></div>
  </div>
  <div class="ct-divider"></div>
  <div class="ct-title">굵기</div>
  <div class="ct-strokes">
    <button class="sw-btn active" data-sw="2">
      <div class="sw-line" style="height:2px"></div>
    </button>
    <button class="sw-btn" data-sw="5">
      <div class="sw-line" style="height:4px"></div>
    </button>
    <button class="sw-btn" data-sw="10">
      <div class="sw-line" style="height:7px"></div>
    </button>
  </div>
</div>

<!-- ════════════════════════════════════════
     MINIMAP
════════════════════════════════════════ -->
<canvas id="minimap" width="160" height="100"></canvas>

<!-- ════════════════════════════════════════
     PEN SETTINGS PANEL
════════════════════════════════════════ -->
<div id="pen-panel">
  <div class="pp-header">
    <span id="pp-title-txt">펜 설정</span>
    <button class="pp-x" id="pp-close-btn">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M2 2L10 10M10 2L2 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <div class="pp-body">
    <div class="pp-sect">
      <div class="pp-lbl">안정화 (Smoothing)</div>
      <div class="pp-row">
        <input type="range" id="pp-smooth" min="0" max="20" step="1" value="0">
        <span class="pp-num" id="pp-smooth-v">0</span>
      </div>
      <div class="pp-chips" id="pp-sc">
        <button class="pp-chip pp-on" data-smooth="0">없음</button>
        <button class="pp-chip" data-smooth="5">약간</button>
        <button class="pp-chip" data-smooth="10">보통</button>
        <button class="pp-chip" data-smooth="18">강함</button>
      </div>
    </div>
    <div class="pp-sect">
      <div class="pp-lbl">불투명도</div>
      <div class="pp-row">
        <input type="range" id="pp-opacity" min="5" max="100" step="5" value="100">
        <span class="pp-num" id="pp-opacity-v">100%</span>
      </div>
    </div>
    <div class="pp-sect" id="pp-cap-sect">
      <div class="pp-lbl">선 끝 모양</div>
      <div class="pp-caps">
        <button class="pp-cap pp-on" data-cap="round">
          <svg width="30" height="10"><line x1="5" y1="5" x2="25" y2="5" stroke="currentColor" stroke-width="5" stroke-linecap="round"/></svg>
          <span>둥글게</span>
        </button>
        <button class="pp-cap" data-cap="square">
          <svg width="30" height="10"><line x1="5" y1="5" x2="25" y2="5" stroke="currentColor" stroke-width="5" stroke-linecap="square"/></svg>
          <span>각지게</span>
        </button>
        <button class="pp-cap" data-cap="butt">
          <svg width="30" height="10"><line x1="7" y1="5" x2="23" y2="5" stroke="currentColor" stroke-width="5" stroke-linecap="butt"/></svg>
          <span>짧게</span>
        </button>
      </div>
    </div>
    <div class="pp-sect" id="pp-pressure-sect">
      <div class="pp-lbl">끝 처리 (Taper)</div>
      <div class="pp-chips" id="pp-pc">
        <button class="pp-chip pp-on" data-pressure="none">없음</button>
        <button class="pp-chip" data-pressure="start">시작</button>
        <button class="pp-chip" data-pressure="end">끝</button>
        <button class="pp-chip" data-pressure="both">양쪽</button>
      </div>
    </div>
    <div class="pp-sect">
      <div class="pp-lbl">미리보기</div>
      <div id="pp-preview-wrap">
        <svg id="pp-preview-svg" viewBox="0 0 200 42" preserveAspectRatio="none">
          <path id="pp-preview-path"
            d="M10,30 Q30,10 50,22 Q70,34 90,18 Q110,8 130,22 Q150,34 170,16 Q185,8 192,14"
            fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════
     CONTEXT MENU
════════════════════════════════════════ -->
<div id="ctx">
  <div class="citem" data-action="front">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2V10M4 5L7 2L10 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 12H12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/></svg>
    맨 앞으로
  </div>
  <div class="citem" data-action="back">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 12V4M4 9L7 12L10 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 2H12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/></svg>
    맨 뒤로
  </div>
  <div class="cdiv"></div>
  <div class="citem" data-action="dup">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="4.5" y="1.5" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="1.5" y="4.5" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="currentColor" fill-opacity="0.08"/></svg>
    복제
  </div>
  <div class="cdiv"></div>
  <div class="citem danger" data-action="del">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 4H12L11 13H3L2 4Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M1 4H13M5 4V2H9V4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    삭제
  </div>
</div>

<!-- ════════════════════════════════════════
     SNACKBAR
════════════════════════════════════════ -->
<div id="snack"></div>

<!-- ════════════════════════════════════════
     SAVE DIALOG
════════════════════════════════════════ -->
<div id="save-overlay">
  <div id="save-dialog">
    <div class="save-dialog-header">
      <div class="save-dialog-title">저장</div>
      <div class="save-dialog-subtitle">캔버스를 파일로 저장합니다</div>
    </div>
    <div class="save-dialog-body">
      <div class="save-input-row">
        <label class="save-label" for="save-filename">파일 이름</label>
        <input type="text" id="save-filename" class="save-input" placeholder="canvas-2026-04-02">
      </div>
    </div>
    <div class="save-dialog-actions">
      <button class="save-btn save-btn-ghost" id="save-cancel-btn">취소</button>
      <button class="save-btn save-btn-secondary" id="save-as-btn">다른 이름으로</button>
      <button class="save-btn save-btn-primary" id="save-quick-btn">저장</button>
    </div>
  </div>
</div>

<!-- Hidden Inputs -->
<input type="file" id="img-in"  accept="image/*" style="display:none">
<input type="file" id="load-in" style="display:none">

<!-- Toolbar drag compatibility shims (legacy refs) -->
<div id="toolbar" style="display:none" aria-hidden="true">
  <div id="tb-drag-handle" style="display:none"></div>
  <div id="tb-tools" style="display:none"></div>
</div>
<div id="mode-bar" style="display:none" aria-hidden="true"></div>
<div id="ur-cluster" style="display:none" aria-hidden="true"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
